name: Bump Version on Deployment PR

on:
  pull_request:
    branches:
      - deployment

jobs:
  bump-minor-version:
    runs-on: ubuntu-latest
    steps:

      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.VERSION_BUMPER_APPID }}
          private-key: ${{ secrets.VERSION_BUMPER_SECRET }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Detect if version file is already changed
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}"
          CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")

          if echo "$CHANGED_FILES" | grep -qx "analytics/_version.py"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping version bump because analytics/_version.py is already in this PR."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump minor version in analytics/_version.py
        if: steps.changed.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          version_file = Path("analytics/_version.py")
          text = version_file.read_text(encoding="utf-8")

          match = re.search(r"__version__\s*=\s*['\"](\d+)\.(\d+)\.(\d+)['\"]", text)
          if not match:
              raise SystemExit("Could not parse __version__ in analytics/_version.py")

          major, minor, _patch = map(int, match.groups())
          new_version = f"{major}.{minor + 1}.0"
          updated = re.sub(
              r"__version__\s*=\s*['\"]\d+\.\d+\.\d+['\"]",
              f"__version__ = '{new_version}'",
              text,
              count=1,
          )
          version_file.write_text(updated, encoding="utf-8")
          print(f"Bumped version to {new_version}")
          PY

      - name: Commit and push version change
        if: steps.changed.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analytics/_version.py

          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          git commit -m "ci: bump minor version for deployment PR"
          git push origin "HEAD:${{ github.head_ref }}"
